# CRM Sanitizer — OpenEnv Manifest
# This file is read by `openenv validate` during judging

name: crm-sanitizer
version: "1.0.0"
description: >
  CRM Sanitizer: An OpenEnv benchmark where AI agents clean, audit,
  and reason over messy customer data — the task every revenue
  operations team does manually, every single day.

author: your-hf-username
license: MIT

# Environment entry point
entry_point: server.app:app

# The three tasks judges will evaluate
tasks:
  - id: easy_basic_fix
    name: "Easy — Basic CRM Audit & Fix"
    description: >
      A 10-row CRM table with missing values, one duplicate entry,
      and one phone format issue. Full issue hints provided.
    difficulty: easy
    max_steps: 15
    reward_threshold: 0.70

  - id: medium_format_dedup
    name: "Medium — Format Standardization & Deduplication"
    description: >
      A 25-row CRM table with mixed date formats, inconsistent city
      names, and 3 duplicate entries. Only affected column names
      are hinted, not specific rows.
    difficulty: medium
    max_steps: 20
    reward_threshold: 0.55

  - id: hard_full_audit
    name: "Hard — Full Audit, No Hints"
    description: >
      A 40-row CRM table with all issue types combined plus 2
      genuinely ambiguous cases. No hints provided. Agent must
      discover all issues independently.
    difficulty: hard
    max_steps: 30
    reward_threshold: 0.35

# Action space summary
actions:
  - fill_missing
  - remove_duplicate
  - standardize_format
  - fix_value
  - get_column_stats
  - bulk_fix_column
  - flag_ambiguous
  - submit

# Observation fields
observation:
  - table_markdown
  - issues_remaining
  - issues_fixed
  - total_issues
  - last_action_result
  - task_description
  - step_number
  - column_hint

# Hardware requirements (fits within competition limits)
hardware:
  min_vcpu: 1
  min_memory_gb: 2
  recommended_vcpu: 2
  recommended_memory_gb: 4

# Docker configuration
docker:
  dockerfile: server/Dockerfile
  port: 7860